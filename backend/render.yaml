services:
  - type: web
    name: nightmarket-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn --bind 0.0.0.0:$PORT main:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RUN_MODE
        value: production
      - key: SKIP_MODELS
        value: "true"