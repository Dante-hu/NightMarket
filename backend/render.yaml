services:
  - type: web
    name: nightmarket-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT main:app_instance
    envVars:
      - key: DATABASE_URL
        sync: false # We should set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
